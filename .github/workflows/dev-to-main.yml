name: Deploy Frontend and Backend to Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 1. Build and Push Frontend
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USER }}/frontend-vishalborle:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build and Push Backend
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USER }}/backend-vishalborle:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Deploy both to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log into Docker Hub on EC2
            docker login -u "${{ secrets.DOCKER_USER }}" -p "${{ secrets.DOCKER_TOKEN }}"

            # Pull latest images
            docker pull ${{ secrets.DOCKER_USER }}/frontend-vishalborle:latest
            docker pull ${{ secrets.DOCKER_USER }}/backend-vishalborle:latest

            # Deploy Frontend (Fixed Port to 3000)
            docker rm -f frontend || true
            docker run -d \
              --name frontend \
              --restart unless-stopped \
              -p 127.0.0.1:5000:80 \
              ${{ secrets.DOCKER_USER }}/frontend-vishalborle:latest

            # Deploy Backend (New Service on Port 5000)
            docker rm -f backend || true
            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 127.0.0.1:3000:3000 \
              --env-file /home/ec2-user/.env \
              ${{ secrets.DOCKER_USER }}/backend-vishalborle:latest

            # Clean up old unused images to save EC2 disk space
            docker image prune -af
